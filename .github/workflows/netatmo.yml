# Fichier à placer dans ton dépôt à : .github/workflows/netatmo.yml
#
# Fait tourner netatmo_compare.py toutes les 30 min sur les serveurs GitHub (gratuit),
# envoie les alertes sur ton iPhone via ntfy, ET publie le dashboard sur GitHub Pages.
# Aucun ordinateur à laisser allumé.
#
# Identifiants = "Secrets" du dépôt (Settings > Secrets and variables > Actions).
# État (historique + refresh_token qui tourne) conservé entre exécutions via le cache.
#
# ⚠️ Pages : active d'abord Pages dans Settings > Pages > "Build and deployment" >
#    Source = "GitHub Actions". Sur plan gratuit, le site publié est PUBLIC
#    (il n'affiche que des températures, pas d'adresse).
 
name: Netatmo alerte chaleur
 
on:
  schedule:
    # Toutes les 30 min, de 18:00 à 09:30 UTC (~16h-07h heure de Paris en été).
    - cron: "*/30 16-23,0-8 * * *"
  workflow_dispatch: {}   # lancement manuel depuis l'onglet Actions
 
# Droits nécessaires au déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write
 
# Évite deux exécutions simultanées (sinon le refresh_token se désynchronise)
concurrency:
  group: netatmo
  cancel-in-progress: false
 
jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v6
 
      - name: Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
 
      # Restaure l'état précédent (historique + dernier refresh_token).
      # Clé unique par exécution + restore-keys préfixe = on lit le plus récent et on réécrit.
      - name: Restaurer l'état
        uses: actions/cache/restore@v5
        with:
          path: state
          key: netatmo-state-${{ github.run_id }}
          restore-keys: |
            netatmo-state-
 
      - name: Exécuter
        env:
          NETATMO_CLIENT_ID: ${{ secrets.NETATMO_CLIENT_ID }}
          NETATMO_CLIENT_SECRET: ${{ secrets.NETATMO_CLIENT_SECRET }}
          NETATMO_REFRESH_TOKEN: ${{ secrets.NETATMO_REFRESH_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NETATMO_STATE_DIR: state
          # --- Réglages externalisés en Variables de dépôt ---
          # Settings > Secrets and variables > Actions > onglet "Variables".
          # Modifiables depuis l'interface GitHub, sans toucher à ce fichier.
          # Les valeurs après "||" sont les valeurs par défaut si la variable n'existe pas.
          NETATMO_INDOOR_ROOMS: ${{ vars.NETATMO_INDOOR_ROOMS }}            # ex: "RDC / entrée,Souplex / salon" (vide = toutes les zones)
          NETATMO_RADIUS_KM: ${{ vars.NETATMO_RADIUS_KM || '2.0' }}
          NETATMO_HEAT_MAX_C: ${{ vars.NETATMO_HEAT_MAX_C || '28.0' }}             # mode forte chaleur au-dessus de ce max extérieur
          NETATMO_NOTIFY_MIN_INDOOR_C: ${{ vars.NETATMO_NOTIFY_MIN_INDOOR_C || '25.0' }}  # alerte OUVRIR seulement si la pièce dépasse ça
          NETATMO_MARGIN_OPEN_C: ${{ vars.NETATMO_MARGIN_OPEN_C || '1.0' }}
          NETATMO_MARGIN_CLOSE_C: ${{ vars.NETATMO_MARGIN_CLOSE_C || '0.0' }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: |
          mkdir -p state
          python3 netatmo_compare.py --notify --quiet
 
      - name: Sauvegarder l'état
        if: always()
        uses: actions/cache/save@v5
        with:
          path: state
          key: netatmo-state-${{ github.run_id }}
 
      # --- Publication GitHub Pages ---
      - name: Préparer le site
        run: |
          mkdir -p public
          if [ -f state/dashboard.html ]; then
            cp state/dashboard.html public/index.html
          else
            echo "<h1>Dashboard indisponible pour le moment</h1>" > public/index.html
          fi
 
      - name: Configurer Pages
        uses: actions/configure-pages@v5
 
      - name: Téléverser le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
 
      - name: Déployer sur Pages
        id: deploy
        uses: actions/deploy-pages@v4
